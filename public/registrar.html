<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="">
    <main class="banner flex flex-col">
        <nav class="bg-indigo-600 text-white shadow-md">
        <div class=" mx-4 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-hospital text-2xl"></i>
                <div class="text-xs font-bold">
                    <span>Centro de salud</span>
                    <h1 class="text-2xl font-bold">
                        San Rafael
                    </h1>
                    </div>
                </div>
            <div class="flex gap-3">
                <button
                    onclick="redirectPage('portal')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Inicio
                </button>

                <button
                    onclick="redirectPage('turno')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Mis Turnos
                </button>

                <button
                    id="btnProfesionales"
                    onclick="redirectPage('profesional')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    Profesionales
                </button>
                <button
                    id="btnCerrarSecion"
                    onclick="javascript:logoutUser()"
                    title="Cerrar secion"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="flex flex-col items-center justify-center rounded-md w-[22rem] bg-white my-8 mx-[5rem]">
        <h3 class="font-bold text-3xl gap-1 text-indigo-500 text-center my-8">Registrate</h3>
        <form id="form-login" method="post" action=""
            class="flex flex-col items-center justify-center w-[22rem]">
        <div class="flex flex-col w-[14rem]">
            <label for="rol" class="p-1">Rol:</label>
            <select name="rol" id="rol" class="w-full pl-10 py-2 border rounded-sm" required>
                <option value="admin">Admin</option>
                <option value="paciente">Paciente</option>
            </select>           
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="username" class="p-1">Email:</label>
            <input 
                type="email" 
                id="username"
                class="w-full pl-2 py-2 border rounded-sm" name="username"
                required
            />            
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="dni" class="p-1" >DNI:</label>
            <input 
                type="number" 
                id="dni"
                class="w-full pl-2 py-2 border rounded-sm" 
                name="dni"
                required
            />            
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="socialwork" class="p-1">Obra social:</label>
            <select name="socialwork" id="socialwork" class="w-full pl-2 py-2 border rounded-sm" >
                <option value="0">&lt;&lt;Sin Asignar&gt;&gt;</option>
                <option value="APROSS">APROSS</option>
                <option value="AVALIAN">AVALIAN</option>
                <option value="CAJA DE ABOGADOS">CAJA DE ABOGADOS</option>
                <option value="CAJA NOTARIAL">CAJA NOTARIAL</option>
                <option value="DASPU">DASPU</option>
                <option value="ENSALUD">ENSALUD </option>
                <option value="GALENO PLATA">GALENO PLATA</option>
                <option value="GALENO AZUL">GALENO AZUL</option>
                <option value="GALENO ORO">GALENO ORO</option>
                <option value="GRIFF SALUD AZU">GRIFF SALUD AZUL</option>
                <option value="HORIZONTE SALUD">HORIZONTE SALUD</option>
                <option value="HOSPITAL">HOSPITAL</option>
                <option value="IOSFA">IOSFA</option>
                <option value="MEDIFE">MEDIFE</option>
                <option value="MET FLEX">MET FLEX</option>
                <option value="MET MB INTEGRAL">MET MB INTEGRAL</option>
                <option value="MET MC CLASIC">MET MC CLASIC</option>
                <option value="MET MC FAMILIA">MET MC FAMILIA</option>
                <option value="MET MTA">MET MTA</option>
                <option value="MET MTA  AL">MET MTA  AL</option>
                <option value="Met MTA Plus+">Met MTA Plus+</option>
                <option value="MET MTB">MET MTB</option>
                <option value="Met MTB Plus+">Met MTB Plus+</option>
                <option value="MET MTBC">MET MTBC</option>
                <option value="MET MTBC AL">MET MTBC AL</option>
                <option value="MET NOVO A">MET NOVO A</option>
                <option value="MET NOVO B">MET NOVO B</option>
                <option value="MET NOVO C">MET NOVO C</option>
                <option value="MONOTRIBUTO">MONOTRIBUTO</option>
                <option value="MONOTRIBUTO CORAL">MONOTRIBUTO CORAL</option>
                <option value="NIMED OSIM">NIMED OSIM</option>
                <option value="NOBIS">NOBIS</option>
                <option value="OMINT">OMINT</option>
                <option value="OSDE 025 - 030 - 110 ">OSDE 025 - 030 - 110 </option>
                <option value="OSDE 210 - 260 - 700">OSDE 210 - 260 - 700</option>
                <option value="OSDE 310 - 360">OSDE 310 - 360</option>
                <option value="OSDE 360">OSDE 360</option>
                <option value="OSDE 410">OSDE 410</option>
                <option value="OSDE 430 - 450">OSDE 430 - 450</option>
                <option value="OSDE 510">OSDE 510</option>
                <option value="OSDEPYM 2000">OSDEPYM 2000</option>
                <option value="OSDEPYM 2500">OSDEPYM 2500</option>
                <option value="OSDEPYM 3000">OSDEPYM 3000</option>
                <option value="OSDEPYM 4000">OSDEPYM 4000</option>
                <option value="OSDEPYM 800">OSDEPYM 800</option>
                <option value="OSDEPYM ADMISION">OSDEPYM ADMISION</option>
                <option value="OSDEPYM PERSONAL">OSDEPYM PERSONAL</option>
                <option value="OSMISS Plan 200">OSMISS Plan 200</option>
                <option value="PAMI">PAMI</option>
                <option value="PARTICULAR">PARTICULAR</option>
                <option value="PREVENCION SALUD">PREVENCION SALUD</option>
                <option value="PROSALUD OSFOT">PROSALUD OSFOT </option>
                <option value="PROSALUD OSVARA">PROSALUD OSVARA</option>
                <option value="PROT">PROT</option>
                <option value="IPROSS">PROTECCION MEDICA IPROSS</option>
                <option value="SANCOR">SANCOR</option>
                <option value="SIPSSA">SIPSSA</option>
                <option value="SWISS MEDICAL">SWISS MEDICAL</option>
                <option value="ASSPE">UNIMED ASSPE</option>
                <option value="UNIMED">UNIMED OSME</option>
            </select> 
        </div>
        <div class="flex flex-col w-[14rem] ">
            <label for="password" class="p-1">Contraseña:</label>
            <input 
                type="password" 
                class="w-full pl-2 py-2 border rounded-sm focus-visible:outline-none" 
                id="password" 
                name="password"
                required
            />
        </div>
        <div class="flex flex-col w-[14rem] mt-4">
            <button type="button" onclick="javascript:handleClick()" 
            class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full"
            >
            Crear
        </button>
        </div>
            <div class="flex flex-col w-[14rem] mt-1">
            <button type="button" onclick="javascript:redirectPage('')" 
            class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full"
            >
            Cancelar
        </button>
        </div>
        <div id="stockDisplay"></div>
        </form>   
    </div>   
    </main>
    <script src="/js/scripts.js"></script>
    <script src="/js/validateForm.js"></script>
    <script src="/js/crud.js"></script>
    <script>
        function handleClick() {
            if (!validateEmail(document.getElementById('username').value)) {
                alert('El correo electrónico no es válido');
                return;
            }
            createItem({
                endpoint: 'user',
                data: {
                    rol: document.getElementById('rol').value,
                    username: document.getElementById('username').value,
                    dni: document.getElementById('dni').value,
                    socialwork: document.getElementById('socialwork').value,
                    password: document.getElementById('password').value
                },
                redirect: 'portal'
            })
        }
    </script>
</body>
</html>
