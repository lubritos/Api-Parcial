<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Profesional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="">
    <main class="banner flex flex-col">
        <nav class="bg-indigo-600 text-white shadow-md">
        <div class="mx-4 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-hospital text-2xl"></i>
                <div class="text-xs font-bold">
                    <span>Centro de salud</span>
                    <h1 class="text-2xl font-bold">
                        San Rafael
                    </h1>
                </div>
            </div>

            <div class="flex gap-3">
                <button
                    onclick="redirectPage('portal')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Inicio
                </button>

                <button
                    onclick="redirectPage('turno')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Mis Turnos
                </button>

                <button
                    id="btnProfesionales"
                    onclick="redirectPage('profesional')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    Profesionales
                </button>
                <button
                    id="btnCerrarSecion"
                    onclick="logoutUser()"
                    title="Cerrar secion"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="flex flex-col items-center justify-center rounded-md w-[22rem] bg-white my-8 mx-[5rem]">
        <h3 id="titulo" class="font-bold text-3xl gap-1 text-indigo-500 text-center my-8">
            Nuevo Profesional
        </h3>
        <form id="form-login" method="post" action=""
            class="flex flex-col items-center justify-center w-[22rem]">        
        <div class="flex flex-col w-[14rem]">
            <label for="nombre" class="p-1">Nombre Completo:</label>
            <input 
                type="text" 
                id="nombre"
                class="w-full pl-2 py-2 border rounded-sm" name="nombre"
                required
            />            
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="especialidad" class="p-1" >Especialidad:</label>
            <select name="especialidad" 
            id="especialidad" class="w-full pl-2 py-2 border rounded-sm" >
                <option selected="selected" value="ALERGIA">ALERGIA</option>
                <option value="ANATOMIA PATOLOGICA">ANATOMIA PATOLOGICA</option>
                <option value="BIOQUIMICA">BIOQUIMICA</option>
                <option value="CARDIOLOGIA">CARDIOLOGIA</option>
                <option value="CIRUGIA PLASTICA">CIRUGIA PLASTICA</option>
                <option value="CLINICA MEDICA">CLINICA MEDICA</option>
                <option value="DERMATOLOGÍA">DERMATOLOGÍA</option>
                <option value="ECOGRAFIA">ECOGRAFIA</option>
                <option value="ENDOCRINOLOGIA">ENDOCRINOLOGIA</option>
                <option value="ESTETICA MEDICA">ESTETICA MEDICA</option>
                <option value="FLEBOLOGIA">FLEBOLOGIA</option>
                <option value="FONOAUDIOLOGÍA">FONOAUDIOLOGÍA</option>
                <option value="GASTROENTEROLOGIA">GASTROENTEROLOGIA</option>
                <option value="GINECOLOGIA PATOLOGIA MAMARIA">GINECOLOGIA PATOLOGIA MAMARIA</option>
                <option value="GINECOLOGIA Y OBSTERICIA">GINECOLOGIA Y OBSTERICIA</option>
                <option value="KINESIOLOGIA">KINESIOLOGIA</option>
                <option value="LABORATORIO">LABORATORIO</option>
                <option value="NEUMONOLOGIA">NEUMONOLOGIA</option>
                <option value="NEUROCIRUGÍA">NEUROCIRUGÍA</option>
                <option value="NEUROLOGIA">NEUROLOGIA</option>
                <option value="NUTRICIONISTA">NUTRICIONISTA</option>
                <option value="ODONTOLOGIA">ODONTOLOGIA</option>
                <option value="OFTALMOLOGIA">OFTALMOLOGIA</option>
                <option value="OSTEOPATIA">OSTEOPATIA</option>
                <option value="OTORRINOLARINGOLOGA">OTORRINOLARINGOLOGA</option>
                <option value="PEDIATRIA">PEDIATRIA</option>
                <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                <option value="PSICOPEDAGOGÍA">PSICOPEDAGOGÍA</option>
                <option value="PSIQUIATRIA">PSIQUIATRIA</option>
                <option value="REUMATOLOGIA">REUMATOLOGIA</option>
                <option value="TRAUMATOLOGIA">TRAUMATOLOGIA</option>
                <option value="UROLOGIA">UROLOGIA</option>
            </select>
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="descripcion" class="p-1">Descripcion:</label>
            <textarea 
                id="descripcion" 
                class="w-full pl-2 py-2 border rounded-sm" 
                name="descripcion"
                placeholder="Ingrese una descripcion"
            ></textarea>       
        </div>
        <div class="flex flex-col w-[14rem] mt-4">
            <button
                type="button"
                id="form-btn"
                onclick="javascript:handleClick()"
                class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full">
                Crear
            </button>
            <button
                type="button"
                id="form-btn"
                onclick="javascript:redirectPage('profesional')"
                class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full">
                Cancelar
            </button>
        </div>
        </form>
    </div>
    </main>
    <script src="/js/scripts.js"></script>
    <script src="/js/validateForm.js"></script>
    <script src="/js/crud.js"></script>
    <script>
        function getProfesional(id) {
            GenericApiData(`/api/profesional/${id}`, 'GET').then(response => {
                if (!response) return
                document.getElementById('nombre').value = response.nombre;
                document.getElementById('especialidad').value = response.especialidad;
                document.getElementById('descripcion').value = response.descripcion;
            })
        }
        function getProfesionalId() {
            const pathName = document.location.pathname
            const urlSplit = pathName.split('/');
            const profesionalId = urlSplit[urlSplit.length - 1];
            if (profesionalId && profesionalId !== 'nuevo_profesional') {
                document.getElementById('titulo').innerHTML = 'Actualizar Profesional';
                document.getElementById('form-btn').innerHTML = 'Actualizar';
                getProfesional(profesionalId);
            }
        }

        function createProfesional() {
            createItem({
                endpoint: 'profesional',
                data: {
                    nombre: document.getElementById('nombre').value,
                    especialidad: document.getElementById('especialidad').value,
                    descripcion: document.getElementById('descripcion').value
                },
                redirect: 'profesional'
            })
        }

        function handleClick() {
            const pathName = document.location.pathname
            const urlSplit = pathName.split('/');
            const profesionalId = urlSplit[urlSplit.length - 1];
            if (profesionalId && profesionalId !== 'nuevo_profesional') {
                editItem(profesionalId, 'profesional', {
                    nombre: document.getElementById('nombre').value,
                    especialidad: document.getElementById('especialidad').value,
                    descripcion: document.getElementById('descripcion').value
                });
                return
            }
            createProfesional();
        }
        getProfesionalId();
    </script>
</body>
</html>
