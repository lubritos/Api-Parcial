<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consultar Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="banner-login">
  <main class=" flex w-[22rem] h-screen bg-white">
    <form id="form-login" method="post" action=""
    class="flex flex-col items-center justify-center w-full h-96 rounded-md">
      <div class="flex flex-col w-[14rem] ">
        <label for="username" class="p-1" >Usuario:</label>
        <div class="relative ">
          <i class="fa-solid fa-user mr-2 absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input
            type="text"
            id="username"
            class="w-full pl-10 py-2 border rounded-sm"
            name="username"
            required
          />
        </div>
      </div>
      <div class="flex flex-col w-[14rem] ">
        <label for="password" class="p-1">Contraseña:</label>
        <div class="relative">
          <i class="fa-solid fa-lock mr-2 absolute left-3 top-1/2 -translate-y-1/2"></i>
          <input 
            id="password"
            type="password"
            class="w-full pl-10 py-2 border rounded-sm focus-visible:outline-none" 
            name="nombre"
            required
          />
        </div>
      </div>
      <div class="flex flex-col w-[14rem] mt-4">
        <button
          type="button"
          onclick="javascript: loginUser()"
          class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full">
          Ingresar
        </button>
        <button 
          type="button" 
          onclick="javascript: redirectToRegister()"
          class="border-indigo-500 hover:bg-indigo-700 text-indigo-500 hover:text-white font-bold py-2 px-4 w-full rounded">
            Crear Usuario
        </button>
      </div>
    </form>
  </main>
  <script src="/js/scripts.js"></script>
  <script src="/js/register.js"></script>

</body>
</html>
