<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turno</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="p-2">
        <div class="flex w-full items-center justify-around">
            <h1 class="font-bold text-5xl gap-1 text-indigo-500 text-center my-8">
                Mis Turnos
            </h1>
            <button
                type="button" 
                onclick="javascript: redirectPage('nuevo_turno')" 
                class="flex flex-row items-center justify-center w-40 h-12 rounded-md bg-indigo-500 text-white text-center ">
                <i class="fa-solid fa-calendar-check mr-2 text-sm"></i>
                <h3 class="font-bold text-md gap-1 uppercase">
                    Nuevo Turno
                </h3>
            </button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-[60px_1fr_1fr] gap-2 py-4">
            <h2 class="font-bold text-md gap-1 text-indigo-500">Filtrar:</h2>
            <select
            onchange="javascript: filtrarTurnos()"    
            class="w-full pl-2 py-2 border rounded-sm"
                id="filtroEspecialidad">
                <option selected="selected" value="">Seleccione especialidad</option>
                <option value="ALERGIA">ALERGIA</option>
                <option value="ANATOMIA PATOLOGICA">ANATOMIA PATOLOGICA</option>
                <option value="BIOQUIMICA">BIOQUIMICA</option>
                <option value="CARDIOLOGIA">CARDIOLOGIA</option>
                <option value="CIRUGIA PLASTICA">CIRUGIA PLASTICA</option>
                <option value="CLINICA MEDICA">CLINICA MEDICA</option>
                <option value="DERMATOLOGÍA">DERMATOLOGÍA</option>
                <option value="ECOGRAFIA">ECOGRAFIA</option>
                <option value="ENDOCRINOLOGIA">ENDOCRINOLOGIA</option>
                <option value="ESTETICA MEDICA">ESTETICA MEDICA</option>
                <option value="FLEBOLOGIA">FLEBOLOGIA</option>
                <option value="FONOAUDIOLOGÍA">FONOAUDIOLOGÍA</option>
                <option value="GASTROENTEROLOGIA">GASTROENTEROLOGIA</option>
                <option value="GINECOLOGIA PATOLOGIA MAMARIA">GINECOLOGIA PATOLOGIA MAMARIA</option>
                <option value="GINECOLOGIA Y OBSTERICIA">GINECOLOGIA Y OBSTERICIA</option>
                <option value="KINESIOLOGIA">KINESIOLOGIA</option>
                <option value="LABORATORIO">LABORATORIO</option>
                <option value="NEUMONOLOGIA">NEUMONOLOGIA</option>
                <option value="NEUROCIRUGÍA">NEUROCIRUGÍA</option>
                <option value="NEUROLOGIA">NEUROLOGIA</option>
                <option value="NUTRICIONISTA">NUTRICIONISTA</option>
                <option value="ODONTOLOGIA">ODONTOLOGIA</option>
                <option value="OFTALMOLOGIA">OFTALMOLOGIA</option>
                <option value="OSTEOPATIA">OSTEOPATIA</option>
                <option value="OTORRINOLARINGOLOGA">OTORRINOLARINGOLOGA</option>
                <option value="PEDIATRIA">PEDIATRIA</option>
                <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                <option value="PSICOPEDAGOGÍA">PSICOPEDAGOGÍA</option>
                <option value="PSIQUIATRIA">PSIQUIATRIA</option>
                <option value="REUMATOLOGIA">REUMATOLOGIA</option>
                <option value="TRAUMATOLOGIA">TRAUMATOLOGIA</option>
                <option value="UROLOGIA">UROLOGIA</option>
            </select>
            <select
            onchange="javascript: filtrarTurnos()"
                class="w-full pl-2 py-2 border rounded-sm" id="filtroProfesional">
                <option selected="selected" value="">Seleccione especialidad</option>
            </select>
        </div>
        <table class="w-full table-fixed border-collapse text-sm px-2">
            <thead>
                <tr>
                    <th class="border-b border-gray-200 p-4 pt-0 pb-3 pl-8 text-left font-medium text-gray-400 dark:border-gray-600 dark:text-gray-200">
                        Profesional
                    </th>
                    <th class="border-b border-gray-200 p-4 pt-0 pb-3 text-left font-medium text-gray-400 dark:border-gray-600 dark:text-gray-200">
                        Especialidad
                    </th>
                    <th class="border-b border-gray-200 p-4 pt-0 pr-8 pb-3 text-left font-medium text-gray-400 dark:border-gray-600 dark:text-gray-200">
                        fecha y hora
                    </th>
                    <th class="border-b border-gray-200 p-4 pt-0 pr-8 pb-3 text-left font-medium text-gray-400 dark:border-gray-600 dark:text-gray-200">
                        Acciones
                    </th>
                </tr>
            </thead>
            <tbody class="bg-white dark:bg-gray-800" id="informacion">
                <tr class="py-4">
                    <td class="border-b border-gray-100 p-4 pl-8 text-gray-500 text-center dark:border-gray-700 dark:text-gray-400" colspan="4">
                        No hay turnos registrados
                    </td>
                </tr>
            </tbody>
        </table>
    </main>
    <script src="/js/scripts.js"></script>
    <script src="/js/crud.js"></script>
    <script>

        function filtrarTurnos() {
            const profesional = document.getElementById('filtroProfesional').value;
            const especialidad = document.getElementById('filtroEspecialidad').value;
            listTurno({
                type: profesional ? 'profesional' : 'especialidad',
                value: profesional || especialidad
            });
        }
        function completarFiltroProfesional() {
            let html = '<option selected="selected" value="">Seleccione especialidad</option>';
            const element = document.getElementById('filtroProfesional');
            GenericApiData('/api/profesional', 'GET').then((data) => {
                if (!data.length) return
                data.forEach(element => {
                    html += `<option value="${element._id}">${element.nombre}</option>`;
                });
                element.innerHTML = html
            });
        }
        listTurno();
        completarFiltroProfesional();
    </script>
</body>
</html>
