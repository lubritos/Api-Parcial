<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Profesional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="banner-login">
    <main class="flex flex-col w-[22rem] h-screen bg-white">
        <h3 id="titulo" class="font-bold text-5xl gap-1 text-indigo-500 text-center my-8">
            Nuevo Turno
        </h3>
        <form id="form-login" method="post" action=""
        class="flex flex-col items-center justify-center w-full rounded-md">
        
        <div class="flex flex-col w-[14rem]">
            <label for="nombre" class="p-1">Especialidad:</label>
            <select name="especialidad" 
            onchange="javascript:selectProfesional()"
            id="especialidad" class="w-full pl-2 py-2 border rounded-sm" >
                <option selected="selected" value="admin">Seleccione especialidad</option>
                <option value="ALERGIA">ALERGIA</option>
                <option value="ANATOMIA PATOLOGICA">ANATOMIA PATOLOGICA</option>
                <option value="BIOQUIMICA">BIOQUIMICA</option>
                <option value="CARDIOLOGIA">CARDIOLOGIA</option>
                <option value="CIRUGIA PLASTICA">CIRUGIA PLASTICA</option>
                <option value="CLINICA MEDICA">CLINICA MEDICA</option>
                <option value="DERMATOLOGÍA">DERMATOLOGÍA</option>
                <option value="ECOGRAFIA">ECOGRAFIA</option>
                <option value="ENDOCRINOLOGIA">ENDOCRINOLOGIA</option>
                <option value="ESTETICA MEDICA">ESTETICA MEDICA</option>
                <option value="FLEBOLOGIA">FLEBOLOGIA</option>
                <option value="FONOAUDIOLOGÍA">FONOAUDIOLOGÍA</option>
                <option value="GASTROENTEROLOGIA">GASTROENTEROLOGIA</option>
                <option value="GINECOLOGIA PATOLOGIA MAMARIA">GINECOLOGIA PATOLOGIA MAMARIA</option>
                <option value="GINECOLOGIA Y OBSTERICIA">GINECOLOGIA Y OBSTERICIA</option>
                <option value="KINESIOLOGIA">KINESIOLOGIA</option>
                <option value="LABORATORIO">LABORATORIO</option>
                <option value="NEUMONOLOGIA">NEUMONOLOGIA</option>
                <option value="NEUROCIRUGÍA">NEUROCIRUGÍA</option>
                <option value="NEUROLOGIA">NEUROLOGIA</option>
                <option value="NUTRICIONISTA">NUTRICIONISTA</option>
                <option value="ODONTOLOGIA">ODONTOLOGIA</option>
                <option value="OFTALMOLOGIA">OFTALMOLOGIA</option>
                <option value="OSTEOPATIA">OSTEOPATIA</option>
                <option value="OTORRINOLARINGOLOGA">OTORRINOLARINGOLOGA</option>
                <option value="PEDIATRIA">PEDIATRIA</option>
                <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                <option value="PSICOPEDAGOGÍA">PSICOPEDAGOGÍA</option>
                <option value="PSIQUIATRIA">PSIQUIATRIA</option>
                <option value="REUMATOLOGIA">REUMATOLOGIA</option>
                <option value="TRAUMATOLOGIA">TRAUMATOLOGIA</option>
                <option value="UROLOGIA">UROLOGIA</option>
            </select>
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="profesional" class="p-1" >Profesional:</label>
            <select 
                type="text" 
                id="profesional"
                class="w-full pl-2 py-2 border rounded-sm" name="profesional"
            >
                <option value="admin">Seleccione profesional</option>
            </select>
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="fecha" class="p-1">Fecha:</label>
            <input  type="date" id="fecha" class="w-full pl-2 py-2 border rounded-sm" name="fecha"/>

        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="hora" class="p-1">Hora:</label>
            <input  type="time" id="hora" class="w-full pl-2 py-2 border rounded-sm" name="hora"/>
        </div>
        <div class="flex flex-col w-[14rem]">
            <label for="estado" class="p-1" >Profesional:</label>
            <select 
                type="text" 
                id="estado"
                class="w-full pl-2 py-2 border rounded-sm" name="estado"
            >
                <option selected value="Pendiente">Pendiente</option>
                <option  value="Pendiente">Enviado</option>
                <option  value="Pendiente">Cancelado</option>
            </select>
        </div>
        <input type="hidden" id="paciente" name="paciente" value="" />
        <div class="flex flex-col w-[14rem] mt-4">
            <button
                type="button"
                id="form-btn"
                onclick="javascript:handleClick()"
                class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded w-full">
                Crear
            </button>
        </div>
        </form>
    </main>
    <script src="/js/scripts.js"></script>
    <script src="/js/validateForm.js"></script>
    <script src="/js/crud.js"></script>
    <script>
        function selectProfesional() {
            GenericApiData(`/api/profesional`, 'GET').then(response => {
                if (!response) return
                let html = ''
                const selected = document.getElementById('especialidad').value
                const element = document.getElementById('profesional');
                const filtered = response.filter(profesional => profesional.especialidad === selected);
                filtered.forEach(profesional => {
                    html += `<option value="${profesional._id}">${profesional.nombre}</option>`; 
                })
                element.innerHTML = html
            })
        }
        function getTurno(id) {
            GenericApiData(`/api/turno/${id}`, 'GET').then(response => {
                if (!response) return
                document.getElementById('especialidad').value = response.especialidad;
                selectProfesional();
                document.getElementById('profesional').value = response.profesional;
                document.getElementById('fecha').value = response.fecha;
                document.getElementById('hora').value = response.hora;
                document.getElementById('estado').value = response.estado;
            })
        }
        function getTurnoData() {
            const pathName = document.location.pathname
            const urlSplit = pathName.split('/');
            const turnoId = urlSplit[urlSplit.length - 1];
            if (turnoId && turnoId !== 'nuevo_turno') {
                document.getElementById('titulo').innerHTML = 'Actualizar Turno';
                document.getElementById('form-btn').innerHTML = 'Actualizar';
                getTurno(turnoId);
            }
        }

        function createTurno() {
            createItem({
                endpoint: 'turno',
                data: {
                    profesional: document.getElementById('profesional').value,
                    especialidad: document.getElementById('especialidad').value,
                    fecha: document.getElementById('fecha').value,
                    hora: document.getElementById('hora').value,
                    paciente: document.getElementById('paciente').value,
                    estado: 'Pendiente'
                },
                redirect: 'turno'
            })
        }

        function handleClick() {
            const pathName = document.location.pathname
            const urlSplit = pathName.split('/');
            const turnoId = urlSplit[urlSplit.length - 1];
            if (turnoId && turnoId !== 'nuevo_turno') {
                editItem(turnoId, 'turno', {
                    profesional: document.getElementById('profesional').value,
                    especialidad: document.getElementById('especialidad').value,
                    fecha: document.getElementById('fecha').value,
                    hora: document.getElementById('hora').value,
                    paciente: document.getElementById('paciente').value,
                    estado: document.getElementById('estado').value
                });
                return
            }
            createTurno();
        }
        getTurnoData()
        const userId = getUserId();
        if (userId) {
            document.getElementById('paciente').value = userId;
        }
    </script>
</body>
</html>
