<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="flex flex-col">
        <nav class="bg-indigo-600 text-white shadow-md">
        <div class="mx-4 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-hospital text-2xl"></i>
                <div class="text-xs font-bold">
                    <span>Centro de salud</span>
                    <h1 class="text-2xl font-bold">
                        San Rafael
                    </h1>
                </div>
            </div>

            <div class="flex gap-3">
                <button
                    onclick="redirectPage('portal')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Inicio
                </button>

                <button
                    onclick="redirectPage('turno')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition">
                    Mis Turnos
                </button>

                <button
                    id="btnProfesionales"
                    onclick="redirectPage('profesional')"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    Profesionales
                </button>
                <button
                    id="btnCerrarSecion"
                    onclick="logoutUser()"
                    title="Cerrar secion"
                    class="px-4 py-2 rounded hover:bg-indigo-500 transition hidden">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="p-2">
        <h1 class="font-bold text-5xl gap-1 text-indigo-500 text-center my-8">
            Mi Portal        
        </h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mx-8 items-center justify-center">
            <div
            onclick="javascript: redirectPage('turno')"
            class="hover:scale-[1.05] active:bg-indigo-500 active:text-white text-indigo-500 p-6 rounded-md flex flex-col w-full h-[8rem] bg-white border border-indigo-500">
                <div class="flex items-center">
                    <i class="fa-solid fa-calendar-check mr-2 text-4xl"></i>
                    <h3 class="font-bold text-3xl gap-1 uppercase">
                        Mis Turnos
                    </h3>
                </div>
                <span class="text-lg mt-4 text-black">Revisa y gestioná tus turnos próximos</span>
            </div>
            <div
            id="profesional"
            onclick="javascript: redirectPage('profesional')" 
            class="hover:scale-[1.05] active:bg-indigo-500 active:text-white text-indigo-500 p-6 rounded-md flex flex-col w-full h-[8rem] bg-white border border-indigo-500"
            style="display:none"
            >
            <div class="flex items-center">
                <i class="fa-solid fa-users mr-2 text-4xl"></i>
                <h3 class="font-bold text-3xl gap-1 uppercase">
                    Profesionales
                </h3>
            </div>
            <span class="text-lg mt-4 text-black">Revisa y gestioná los profesionales</span>
            </div>
        </div>
    </div>
    </main>
    <script src="/js/scripts.js"></script>
    <script>
        const isAdmin = getRol() === 'admin' ? true : false;
        const btnProfesionales = document.getElementById('btnProfesionales');
        const profesional = document.getElementById('profesional');
        if (!isAdmin) {
            btnProfesionales.style.display = 'none';
            profesional.style.display = 'none';
        } else {
            btnProfesionales.style.display = 'flex';
            profesional.style.display = 'flex';
        }
    </script>
</body>
</html>
