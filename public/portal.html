<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main class="p-2">
        <h1 class="font-bold text-5xl gap-1 text-indigo-500 text-center my-8">Turnos</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 items-center justify-center">
            <div
            onclick="javascript: redirectPage('turno')"
            class="hover:scale-105 active:bg-indigo-500 active:text-white text-indigo-500 p-6 rounded-md flex flex-col w-full h-[10rem] bg-white border border-indigo-500">
                <div class="flex items-center">
                    <i class="fa-solid fa-calendar-check mr-2 text-4xl"></i>
                    <h3 class="font-bold text-3xl gap-1 uppercase">
                        Mis Turnos
                    </h3>
                </div>
                <span class="text-lg mt-4 text-black">Revisa y gestioná tus turnos próximos</span>
            </div>
            <div
            onclick="javascript: redirectPage('profesional')" 
            class="hover:scale-105 active:bg-indigo-500 active:text-white text-indigo-500 p-6 rounded-md flex flex-col w-full h-[10rem] bg-white border border-indigo-500">
                <div class="flex items-center">
                    <i class="fa-solid fa-calendar-check mr-2 text-4xl"></i>
                    <h3 class="font-bold text-3xl gap-1 uppercase">
                        Profesionales
                    </h3>
                </div>
                <span class="text-lg mt-4 text-black">Revisa y gestioná los profesionales</span>
            </div>
        </div>
    </main>
    <script src="/js/scripts.js"></script>

</body>
</html>
